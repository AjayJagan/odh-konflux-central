name: ODH Konflux Onboarder

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Repository name'
        required: true
        type: choice
        options:
          - caikit-nlp
          - caikit-tgis-serving
          - codeflare-operator
          - data-science-pipelines-operator
          - data-science-pipelines
          - feast
          - fms-guardrails-orchestrator
          - guardrails-detectors
          - guardrails-regex-detector
          - ilab-on-ocp
          - kserve
          - kubeflow
          - kuberay
          - lm-evaluation-harness
          - ml-metadata
          - model-registry-operator
          - model-registry
          - modelmesh-runtime-adapter
          - modelmesh-serving
          - modelmesh
          - notebooks
          - opendatahub-operator
          - odh-dashboard
          - odh-model-controller
          - openvino_model_server
          - rest-proxy
          - text-generation-inference
          - training-operator
          - trustyai-explainability
          - trustyai-service-operator
          - vllm-orchestrator-gateway
          - llm-d-inference-scheduler
          - llm-d-routing-sidecar
          - llama-stack-k8s-operator
          - odh-data-science-pipelines-argo-argoexec
          - odh-data-science-pipelines-argo-workflowcontroller
          - odh-model-metadata-collection
          - kube-auth-proxy
          - llama-stack-provider-ragas
          - mlserver
          - trainer
          - mlflow
          - mlflow-operator
          - eval-hub
          - spark-operator
          - llama-stack-provider-trustyai-garak
          - NeMo-Guardrails
          - llm-d-kv-cache
          - batch-gateway
          - workload-variant-autoscaler

          # Add all valid components here
      pr_target_branch:
        description: 'Branch to open the PR against (e.g. master).'
        required: true
        type: string
      build_branch:
        description: 'Branch that images are built from (e.g. stable).'
        required: true
        type: string
      version:
        description: 'New version (Required only for Release builds)'
        required: false
        type: string
      build_type:
        description: 'Select build type'
        required: true
        type: choice
        options:
          - CI
          - Release

jobs:
  update-tekton-pipelines-and-create-pr:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Checkout OKC repository
        uses: actions/checkout@v4
        with:
          path: okc-repo

      - name: Generate github-app token
        id: app-token
        uses: getsentry/action-github-app-token@v2
        with:
          app_id: ${{ secrets.ODH_DEVOPS_APP_ID }}
          private_key: ${{ secrets.ODH_DEVOPS_APP_PRIVATE_KEY }}

      - name: Set environment variables
        run: |
          echo "REPOSITORY=opendatahub-io/${{ inputs.component }}" >> $GITHUB_ENV
          echo "OKC_FOLDER=${{ inputs.component }}" >> $GITHUB_ENV

      - name: Validate and set tag
        run: |
          BUILD_TYPE="${{ inputs.build_type }}"
          VERSION="${{ inputs.version }}"
          BASE_COMPONENT="odh-${{ inputs.component }}"
          
          echo "Build type: $BUILD_TYPE"
          echo "Version: $VERSION"
          
          if [ "$BUILD_TYPE" = "CI" ]; then
            EFFECTIVE_TAG="odh-stable"
            COMPONENT_NAME="${BASE_COMPONENT}-ci"
          
          elif [ "$BUILD_TYPE" = "Release" ]; then
            if [ -z "$VERSION" ]; then
              echo "ERROR: Version is required for Release build"
              exit 1
            fi
          
            EFFECTIVE_TAG="$VERSION"
            COMPONENT_NAME="${BASE_COMPONENT}"
          
          else
            echo "ERROR: Invalid build_type value"
            exit 1
          fi
          
          echo "EFFECTIVE_TAG=$EFFECTIVE_TAG" >> $GITHUB_ENV
          echo "COMPONENT_NAME=$COMPONENT_NAME" >> $GITHUB_ENV


      - name: Prepare Tekton files
        run: |
          set -e
      
          BUILD_TYPE="${{ inputs.build_type }}"
          VERSION="${{ inputs.version }}"
          OKC_FOLDER="${{ inputs.component }}"
          TARGET_BRANCH="${{ inputs.build_branch }}"
      
          repo_folder="okc-repo/pipelineruns/${OKC_FOLDER}"
          echo "Repo folder: $repo_folder"
          echo "Build type: $BUILD_TYPE"
          echo "Version: $VERSION"
      
          if [ ! -d "$repo_folder" ]; then
            echo "ERROR: $repo_folder does not exist"
            exit 1
          fi
      
          mkdir -p .tekton
      
          ##################################################
          # CI BUILD
          ##################################################
          if [ "$BUILD_TYPE" = "CI" ]; then
      
            echo "CI build → syncing all pipelineruns"
      
            find "$repo_folder" -type f -name "*.yaml" | while read src_file; do
      
              filename=$(basename "$src_file")
              target_file=".tekton/$filename"
      
              cp "$src_file" "$target_file"
      
              if [[ "$filename" == *pull* ]]; then
                EFFECTIVE_TAG="odh-pr"
              elif [[ "$filename" == *push* ]]; then
                EFFECTIVE_TAG="odh-stable"
              else
                echo "ERROR: Unknown pipeline type in CI"
                exit 1
              fi
      
              sed -i -E 's|\$\$OUTPUT_IMAGE_TAG\$\$|'"${EFFECTIVE_TAG}"'|g' "$target_file"
              sed -i -E 's|\$\$TARGET_BRANCH\$\$|'"${TARGET_BRANCH}"'|g' "$target_file"
      
            done
          fi
      
          ##################################################
          # RELEASE BUILD
          ##################################################
          if [ "$BUILD_TYPE" = "Release" ]; then
      
            if [ -z "$VERSION" ]; then
              echo "ERROR: Version is required for Release build"
              exit 1
            fi
      
            echo "Release build → ensuring release-push file exists"
      
            find "$repo_folder" -type f -name "*-push.yaml" | while read src_file; do
      
              base_name=$(basename "$src_file")
              release_name="${base_name%-push.yaml}-release-push.yaml"
              target_file=".tekton/$release_name"
      
              if [ ! -f "$target_file" ]; then
                echo "Creating new release file $target_file"
                cp "$src_file" "$target_file"
              else
                echo "Release file exists → updating $target_file"
              fi
      
              sed -i -E 's|(name: .*)-on-push|\1-on-release-push|' "$target_file"
              sed -i -E 's|\$\$OUTPUT_IMAGE_TAG\$\$|'"${VERSION}"'|g' "$target_file"
              sed -i -E 's|\$\$TARGET_BRANCH\$\$|'"${TARGET_BRANCH}"'|g' "$target_file"
      
            done
          fi
      
          ##################################################
          # INVALID TYPE GUARD
          ##################################################
          if [ "$BUILD_TYPE" != "CI" ] && [ "$BUILD_TYPE" != "Release" ]; then
            echo "ERROR: Invalid build_type"
            exit 1
          fi
      
          echo "Tekton processing complete."


      - name: Prepare GitHub workflow files (if applicable)
        run: |
          src_dir="okc-repo/workflows/${{ inputs.component }}"
          dest_dir="extracted/.github/workflows"
          mkdir -p "$dest_dir"

          if [ -d "$src_dir" ]; then
            echo "Copying workflow files from $src_dir to $dest_dir"
            find "$src_dir" -type f -name "*.yaml" -exec cp {} "$dest_dir/" \;

            echo "Updating $$TARGET_BRANCH$$ to ${{ inputs.build_branch }} in GitHub workflow files"
            find "$dest_dir" -type f -name "*.yaml" | while read file; do
            # Replace $$TARGET_BRANCH$$ with the build branch (the branch images are built from)
            perl -0777 -i -pe 's/\$\$TARGET_BRANCH\$\$/'"${{ inputs.build_branch }}"'/g' "$file"
          done
          else
            echo "No workflows directory found for component '${{ inputs.component }}'. Skipping."
          fi

      - name: Clone and push Tekton changes
        run: |
          set -e
      
          WORKSPACE_DIR="$GITHUB_WORKSPACE"
          SOURCE_TEKTON="$WORKSPACE_DIR/.tekton"
      
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${REPOSITORY} repo-workspace
          cd repo-workspace
      
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git fetch origin ${{ inputs.pr_target_branch }}
          git checkout -B ${{ inputs.pr_target_branch }} origin/${{ inputs.pr_target_branch }}
      
          branch_name="appstudio-${{ inputs.component }}-konflux-replicator-${{ inputs.version }}-$(date +%s)"
          echo "BRANCH_NAME=$branch_name" >> $GITHUB_ENV
      
          git checkout -B "$branch_name" ${{ inputs.pr_target_branch }}
      
          ########################################
          # Copy .tekton files (NEW LOGIC)
          ########################################
      
          mkdir -p .tekton
      
          if compgen -G "$SOURCE_TEKTON/*.yaml" > /dev/null; then
            echo "Copying Tekton files from $SOURCE_TEKTON"
      
            for file in "$SOURCE_TEKTON"/*.yaml; do
              target=".tekton/$(basename "$file")"
              cp "$file" "$target"
              git add -f "$target"
            done
          else
            echo "ERROR: No Tekton YAML files found in $SOURCE_TEKTON"
            exit 1
          fi
      
          ########################################
          # Copy workflows if they exist
          ########################################
      
          WORKFLOW_SRC="$WORKSPACE_DIR/.github/workflows"
          WORKFLOW_DEST=".github/workflows"
      
          if [ -d "$WORKFLOW_SRC" ]; then
            echo "Copying workflow files"
            mkdir -p "$WORKFLOW_DEST"
            rsync -av "$WORKFLOW_SRC/" "$WORKFLOW_DEST/"
            git add -f "$WORKFLOW_DEST"
          else
            echo "No workflow updates found."
          fi
      
          ########################################
          # Commit
          ########################################
      
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "commit=false" >> $GITHUB_ENV
            exit 0
          fi
      
          git commit -m "Update Tekton files for ${{ inputs.build_type }} build"
          git push --set-upstream origin "$branch_name"
      
          echo "commit=true" >> $GITHUB_ENV


      - name: Create Pull Request
        if: env.commit == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --repo "${REPOSITORY}" \
            --base "${{ inputs.pr_target_branch }}" \
            --head "${BRANCH_NAME}" \
            --title "Update Tekton files to ${EFFECTIVE_TAG}" \
            --body "This PR updates the \`output-image\` tags and CEL expressions in \`.tekton/\` to \`${EFFECTIVE_TAG}\`.

          - **PR target branch:** \`${{ inputs.pr_target_branch }}\`
          - **Build branch:** \`${{ inputs.build_branch }}\`"


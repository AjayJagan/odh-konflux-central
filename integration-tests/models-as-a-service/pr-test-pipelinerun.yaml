---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: models-as-a-service-e2e-test
spec:
  pipelineSpec:
    description: |
      An integration test which provisions an ephemeral Hypershift cluster, deploys opendatahub-operator
      from a Konflux snapshot and runs the e2e tests against it.
    params:
      - description: Snapshot of the application
        name: SNAPSHOT
        type: string
    tasks:
      - name: parse-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/integration-examples
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test_metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
      - name: find-component-image
        description: Extract MaaS component images from the Konflux snapshot and resolve PR-tagged refs
        runAfter:
          - parse-metadata
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
          - name: PR_NUMBER
            value: $(tasks.parse-metadata.results.pull-request-number)
        taskSpec:
          params:
          - name: SNAPSHOT
          - name: PR_NUMBER
          results:
            - name: maas-api-image
              description: odh-maas-api-ci image with odh-pr-<PR> tag
            - name: maas-controller-image
              description: odh-maas-controller-ci image with odh-pr-<PR> tag
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            workingDir: /workspace
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: PR_NUMBER
                value: $(params.PR_NUMBER)
              - name: COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
            script: |
              #!/bin/sh
              set -eu

              # Extract the labeled component image (for logs; parse-metadata drives component-container-image)
              COMPONENT_CONTAINER_IMAGE=$(jq -r --arg component_name "${COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .containerImage' <<< "${SNAPSHOT}")
              echo "  COMPONENT_CONTAINER_IMAGE: ${COMPONENT_CONTAINER_IMAGE}"

              # Extract digest refs from snapshot, then strip @sha256:... to get the repo.
              # Append the odh-pr-<PR> tag created by the build pipeline's additional-tags.
              MAAS_API_DIGEST=$(jq -r '.components[] | select(.name == "odh-maas-api-ci") | .containerImage' <<< "${SNAPSHOT}")
              if [ -z "${MAAS_API_DIGEST}" ] || [ "${MAAS_API_DIGEST}" = "null" ]; then
                echo "ERROR: odh-maas-api-ci not found in snapshot" >&2
                exit 1
              fi
              MAAS_API_IMAGE="${MAAS_API_DIGEST%%@*}:odh-pr-${PR_NUMBER}"

              MAAS_CONTROLLER_DIGEST=$(jq -r '.components[] | select(.name == "odh-maas-controller-ci") | .containerImage' <<< "${SNAPSHOT}")
              if [ -z "${MAAS_CONTROLLER_DIGEST}" ] || [ "${MAAS_CONTROLLER_DIGEST}" = "null" ]; then
                echo "ERROR: odh-maas-controller-ci not found in snapshot" >&2
                exit 1
              fi
              MAAS_CONTROLLER_IMAGE="${MAAS_CONTROLLER_DIGEST%%@*}:odh-pr-${PR_NUMBER}"

              echo "  MAAS_API_IMAGE (digest):      ${MAAS_API_DIGEST}"
              echo "  MAAS_API_IMAGE (PR tag):       ${MAAS_API_IMAGE}"
              echo "  MAAS_CONTROLLER_IMAGE (digest): ${MAAS_CONTROLLER_DIGEST}"
              echo "  MAAS_CONTROLLER_IMAGE (PR tag): ${MAAS_CONTROLLER_IMAGE}"

              echo -n "${MAAS_API_IMAGE}" > "$(results.maas-api-image.path)"
              echo -n "${MAAS_CONTROLLER_IMAGE}" > "$(results.maas-controller-image.path)"
      - name: check-prerequisites
        description: check prerequisites if the ITS needs to execute
        runAfter:
          - find-component-image
        taskSpec:
          results:
          - name: event-type
            description: "stores info about event type"
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            env:
              - name: EVENT_TYPE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pac.test.appstudio.openshift.io/event-type']
            script: |
              #!/bin/bash
              set -e
              echo "EVENT_TYPE=${EVENT_TYPE}"
              echo -n "${EVENT_TYPE}" > $(results.event-type.path)

      - name: provision-eaas-space
        runAfter:
          - check-prerequisites
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/build-definitions.git
            - name: revision
              value: main
            - name: pathInRepo
              value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]
      - name: provision-cluster
        runAfter:
          - provision-eaas-space
        taskSpec:
          results:
            - name: clusterName
              value: "$(steps.create-cluster.results.clusterName)"
          steps:
            - name: get-supported-versions
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
            - name: pick-version
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
              params:
                - name: prefix
                  value: "$(steps.get-supported-versions.results.versions[0])."
            - name: create-cluster
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: version
                  value: "$(steps.pick-version.results.version)"
                - name: instanceType
                  value: m5.2xlarge
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]
      - name: e2e-maas-api-openshift
        runAfter:
          - provision-cluster
        params:
        - name: git-url
          value: "$(tasks.parse-metadata.results.source-git-url)"
        - name: git-rev
          value: "$(tasks.parse-metadata.results.source-git-revision)"
        - name: component-image
          value: "$(tasks.parse-metadata.results.component-container-image)"
        - name: maas-api-image
          value: "$(tasks.find-component-image.results.maas-api-image)"
        - name: maas-controller-image
          value: "$(tasks.find-component-image.results.maas-controller-image)"
        taskSpec:
          params:
            - name: git-url
              type: string
            - name: git-rev
              type: string
            - name: component-image
              type: string
            - name: maas-api-image
              type: string
            - name: maas-controller-image
              type: string
          volumes:
            - name: credentials
              emptyDir: {}
          steps:
            - name: get-kubeconfig
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: clusterName
                  value: "$(tasks.provision-cluster.results.clusterName)"
                - name: credentials
                  value: credentials

            - name: clone-repo
              image: alpine/git
              script: |
                echo $(params.git-url)
                echo $(params.git-rev)
                git clone --depth 50 --no-single-branch $(params.git-url) /workspace/source
                git config --global --add safe.directory /workspace/source
                cd /workspace/source
                git checkout $(params.git-rev)

            - name: e2e-maas-api-openshift
              image: quay.io/rhoai/rhoai-task-toolset:maas
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: MAAS_API_IMAGE
                  value: "$(params.maas-api-image)"
                - name: MAAS_CONTROLLER_IMAGE
                  value: "$(params.maas-controller-image)"
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                set -euxo pipefail
                bash
                ./test/e2e/scripts/prow_run_smoke_test.sh
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]

---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: odh-pr-test
spec:
  pipelineSpec:
    description: |
      An integration test which provisions an ephemeral Hypershift cluster, deploys opendatahub-operator
      from a Konflux snapshot and runs the e2e tests against it.
    params:
      - description: Snapshot of the application
        name: SNAPSHOT
        type: string
      - name: oci-artifacts-repo
        default: 'quay.io/opendatahub/odh-ci-artifacts'
        description: The OCI container used to store all test artifacts.
      - name: artifact-browser-url
        default: 'https://app-artifact-browser.apps.rosa.konflux-qe.zmr9.p3.openshiftapps.com'
        description: The OCI container used to store all test artifacts.
    #test
    tasks:
      - name: parse-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/integration-examples
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test_metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
      - name: find-component-image
        description: Placeholder task that prints the Snapshot and outputs standard TEST_OUTPUT
        runAfter:
          - parse-metadata
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
        taskSpec:
          params:
          - name: SNAPSHOT
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            workingDir: /workspace
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
            script: |
              #!/bin/sh

              # Extract the component container image from the SNAPSHOT JSON data
              COMPONENT_CONTAINER_IMAGE=$(jq -r --arg component_name "${COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .containerImage' <<< "${SNAPSHOT}")

              # Log the extracted variable
              echo "  COMPONENT_CONTAINER_IMAGE: ${COMPONENT_CONTAINER_IMAGE}"

      - name: check-prerequisites
        description: check prerequisites if the ITS needs to execute
        runAfter:
          - find-component-image
        taskSpec:
          results:
          - name: event-type
            description: "stores info about event type"
          - name: pull-request-author
          - name: pull-request-number
          - name: git-repo
          - name: git-org
          - name: git-revision
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            env:
              - name: EVENT_TYPE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pac.test.appstudio.openshift.io/event-type']
              - name: SNAPSHOT
                value: $(tasks.generate-snapshot.results.SNAPSHOT)
              - name: COMPONENTS
                value: $(params.COMPONENTS)
              - name: PR_AUTHOR
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pipelinesascode.tekton.dev/sender']
              - name: PR_NUMBER
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pipelinesascode.tekton.dev/pull-request']
              - name: GIT_REPO
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pipelinesascode.tekton.dev/url-repository']
              - name: GIT_ORG
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pipelinesascode.tekton.dev/url-org']
              - name: GIT_REVISION
            script: |
              #!/bin/bash
              set -e
              echo "EVENT_TYPE=${EVENT_TYPE}"
              echo -n "${EVENT_TYPE}" > $(results.event-type.path)
              echo -n "${PR_AUTHOR}" > "$(results.pull-request-author.path)"
              echo -n "${PR_NUMBER}" > "$(results.pull-request-number.path)"
              echo -n "${GIT_REPO}" > "$(results.git-repo.path)"
              echo -n "${GIT_ORG}" > "$(results.git-org.path)"
              echo -n "${GIT_REVISION}" > "$(results.git-revision.path)"

      - name: provision-eaas-space
        runAfter:
          - check-prerequisites
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/build-definitions.git
            - name: revision
              value: main
            - name: pathInRepo
              value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: in
            values: ["pull_request", "retest-all-comment", "on-comment"]
      - name: provision-cluster
        runAfter:
          - provision-eaas-space
        taskSpec:
          results:
            - name: clusterName
              value: "$(steps.create-cluster.results.clusterName)"
          steps:
            - name: get-supported-versions
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
            - name: pick-version
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
              params:
                - name: prefix
                  value: "$(steps.get-supported-versions.results.versions[0])."
            - name: create-cluster
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: version
                  value: "$(steps.pick-version.results.version)"
                - name: instanceType
                  value: m5.2xlarge
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: in
            values: ["pull_request", "retest-all-comment", "on-comment"]
      - name: deploy-and-test
        workspaces:
        - name: basic-auth
          workspace: git-auth
        runAfter:
          - provision-cluster
        params:
        - name: git-url
          value: "$(tasks.parse-metadata.results.source-git-url)"
        - name: git-rev
          value: "$(tasks.parse-metadata.results.target-git-branch)"
        - name: component-image
          value: "$(tasks.parse-metadata.results.component-container-image)"
        taskSpec:
          volumes:
            - name: credentials
              emptyDir: {}
          workspaces:
            - name: basic-auth
              optional: true
          steps:
            - name: get-kubeconfig
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: clusterName
                  value: "$(tasks.provision-cluster.results.clusterName)"
                - name: credentials
                  value: credentials
            - name: deploy-and-e2e
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:its
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                oc get pods
                oc whoami
            - name: must-gather
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:go-its
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                    # component-must-gather, change the component name below
                    mkdir -p "${ARTIFACT_DIR}/gather-feast"
                    oc adm must-gather --image=quay.io/modh/must-gather:rhoai-2.24 --dest-dir "${ARTIFACT_DIR}/gather-feast" -- "export COMPONENT=feastoperator; /usr/bin/gather"

                    # openshift-must-gather
                    mkdir -p "${ARTIFACT_DIR}/gather-openshift"
                    oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"
            - name: git-push-artifacts
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                  - name: revision
                    value: odh
                  - name: pathInRepo
                    value: stepactions/secure-git-push/0.1/secure-git-push.yaml
              params:
                - name: source-path
                  value: /workspace/artifacts-dir
                - name: repo-path
                  value: 'opendatahub-io/odh-build-metadata'
                - name: repo-branch
                  value: 'ci-artifacts'
                - name: sparse-file-path
                  value: 'test-artifacts/docs'
                - name: dest-path
                  value: 'test-artifacts/$(context.pipelineRun.name)'
                - name: pipelinerun-name
                  value: $(context.pipelineRun.name)
    finally:
    - name: push-ci-artifacts-and-update-pr
      workspaces:
      - name: basic-auth
        workspace: git-auth
      params:
        - name: oci-artifacts-repo
          value: $(params.oci-artifacts-repo)
        - name: pipeline-status
          value: $(tasks.status)
      taskSpec:
        volumes:
          - name: odh-registry-secret-volume
            secret:
              secretName: odh-registry-secret
              items:
              - key: .dockerconfigjson
                path: oci-storage-dockerconfigjson
        workspaces:
          - name: basic-auth
            optional: true
        params:
          - name: oci-artifacts-repo
            description: oci-artifacts-repo
          - name: pipeline-status
            type: string
        steps:
          - name: pull-ci-artifacts
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: odh
                - name: pathInRepo
                  value: stepactions/git-clone/0.1/git-clone.yaml
            params:
              - name: repo-path
                value: 'opendatahub-io/odh-build-metadata'
              - name: repo-branch
                value: 'ci-artifacts'
              - name: sparse-file-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
              - name: dest-path
                value: /workspace/odh-ci-artifacts
              - name: artifacts-dir-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
          - name: secure-push-oci
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: odh
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: '/workspace/odh-ci-artifacts/test-artifacts/$(context.pipelineRun.name)'
              - name: oci-ref
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: credentials-volume-name
                value: odh-registry-secret-volume
          - name: share-status-on-pull-request
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: odh
                - name: pathInRepo
                  value: stepactions/pull-request-comment/0.1/pull-request-comment.yaml
            params:
              - name: test-name
                value: $(context.pipelineRun.name)
              - name: oci-container
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: pipeline-aggregate-status
                value: $(params.pipeline-status)
              - name: pull-request-author
                value: $(tasks.audit-snapshot.results.pull-request-author)
              - name: pull-request-number
                value: $(tasks.audit-snapshot.results.pull-request-number)
              - name: git-repo
                value: $(tasks.audit-snapshot.results.git-repo)
              - name: git-org
                value: $(tasks.audit-snapshot.results.git-org)
              - name: git-revision
                value: $(tasks.audit-snapshot.results.git-revision)
              - name: artifact-browser-url
                value: $(params.artifact-browser-url)
          - name: cleanup-artifacts-from-git
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: odh
                - name: pathInRepo
                  value: stepactions/cleanup-git-repo/0.1/cleanup-git-repo.yaml
            params:
              - name: work-dir
                value: '/workspace/odh-ci-artifacts'
              - name: artifacts-dir-path
                value: 'test-artifacts'
              - name: dir-to-be-deleted
                value: '$(context.pipelineRun.name)'
    workspaces:
    - name: git-auth
      optional: true
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'

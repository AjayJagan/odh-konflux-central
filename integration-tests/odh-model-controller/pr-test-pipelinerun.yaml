---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: odh-model-controller-e2e-test
spec:
  timeouts:
    pipeline: 4h0m0s
    tasks: 3h
  pipelineSpec:
    description: |
      An integration test which provisions an ephemeral Hypershift cluster, deploys opendatahub-operator
      from a Konflux snapshot and runs the e2e tests against it.
    params:
      - description: Snapshot of the application
        name: SNAPSHOT
        type: string
      - name: oci-artifacts-repo
        default: 'quay.io/opendatahub/odh-ci-artifacts'
        description: The OCI container used to store all test artifacts.
      - name: artifact-browser-url
        default: 'https://app-artifact-browser.apps.rosa.konflux-qe.zmr9.p3.openshiftapps.com'
        description: The OCI container used to store all test artifacts.
    tasks:
      - name: parse-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/integration-examples
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test_metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
      - name: find-component-image
        description: Placeholder task that prints the Snapshot and outputs standard TEST_OUTPUT
        runAfter:
          - parse-metadata
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
        taskSpec:
          params:
          - name: SNAPSHOT
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            workingDir: /workspace
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
            script: |
              #!/bin/sh

              # Extract the component container image from the SNAPSHOT JSON data
              COMPONENT_CONTAINER_IMAGE=$(jq -r --arg component_name "${COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .containerImage' <<< "${SNAPSHOT}")

              # Log the extracted variable
              echo "  COMPONENT_CONTAINER_IMAGE: ${COMPONENT_CONTAINER_IMAGE}"
      - name: check-prerequisites
        description: check prerequisites if the ITS needs to execute
        runAfter:
          - find-component-image
        taskSpec:
          results:
          - name: event-type
            description: "stores info about event type"
          - name: pull-request-author
          - name: pull-request-number
          - name: git-repo
          - name: git-org
          - name: git-revision
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            env:
              - name: EVENT_TYPE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pac.test.appstudio.openshift.io/event-type']
              - name: PR_AUTHOR
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/sender']
              - name: PR_NUMBER
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pac.test.appstudio.openshift.io/pull-request']
              - name: GIT_REPO
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/url-repository']
              - name: GIT_ORG
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/url-org']
              - name: GIT_REVISION
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/sha']
            script: |
              #!/bin/bash
              set -e
              echo "EVENT_TYPE=${EVENT_TYPE}"
              echo -n "${EVENT_TYPE}" > $(results.event-type.path)
              echo -n "${PR_AUTHOR}" > "$(results.pull-request-author.path)"
              echo -n "${PR_NUMBER}" > "$(results.pull-request-number.path)"
              echo -n "${GIT_REPO}" > "$(results.git-repo.path)"
              echo -n "${GIT_ORG}" > "$(results.git-org.path)"
              echo -n "${GIT_REVISION}" > "$(results.git-revision.path)"
      - name: provision-eaas-space-kserve
        runAfter:
          - check-prerequisites
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/build-definitions.git
            - name: revision
              value: main
            - name: pathInRepo
              value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]
      - name: provision-cluster-kserve
        runAfter:
          - provision-eaas-space-kserve
        taskSpec:
          results:
            - name: clusterName
              value: "$(steps.create-cluster.results.clusterName)"
          steps:
            - name: get-supported-versions
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space-kserve.results.secretRef)
            - name: pick-version
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
              params:
                - name: prefix
                  value: "$(steps.get-supported-versions.results.versions[0])."
            - name: create-cluster
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space-kserve.results.secretRef)
                - name: version
                  value: "$(steps.pick-version.results.version)"
                - name: instanceType
                  value: m5.2xlarge
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]


      - name: e2e-odh-kserve
        runAfter:
          - provision-cluster-kserve
        params:
        - name: git-url
          value: "$(tasks.parse-metadata.results.source-git-url)"
        - name: git-rev
          value: "$(tasks.parse-metadata.results.source-git-revision)"
        - name: component-image
          value: "$(tasks.parse-metadata.results.component-container-image)"
        taskSpec:
          params:
            - name: git-url
              type: string
            - name: git-rev
              type: string
            - name: component-image
              type: string
          volumes:
            - name: credentials
              emptyDir: {}
          steps:
            - name: get-kubeconfig
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space-kserve.results.secretRef)
                - name: clusterName
                  value: "$(tasks.provision-cluster-kserve.results.clusterName)"
                - name: credentials
                  value: credentials

            - name: clone-repo
              image: alpine/git
              script: |
                echo $(params.git-url)
                echo $(params.git-rev)
                git clone --depth 50 --no-single-branch $(params.git-url) /workspace/source
                git config --global --add safe.directory /workspace/source
                cd /workspace/source
                git checkout $(params.git-rev)

            - name: e2e-odh-kserve
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:model-controller-its
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                set -euxo pipefail
                # apk add --no-cache bash make git curl \
                # && curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
                # && install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl \
                # && rm kubectl && bash
                bash
                ODH_MODEL_CONTROLLER_IMAGE=$(params.component-image)
                echo "ODH_MODEL_CONTROLLER_IMAGE=${ODH_MODEL_CONTROLLER_IMAGE}"

                git clone https://github.com/opendatahub-io/kserve.git /tmp/kserve
                pushd /tmp/kserve
                  git fetch --all --tags
                  git checkout release-v0.15

                  export GITHUB_SHA="${PULL_BASE_SHA:-stable}"
                  export ODH_MODEL_CONTROLLER_IMAGE="${ODH_MODEL_CONTROLLER_IMAGE}"

                  echo "Loading environment variables from params.env"
                  #Parse params.env into shell vars with underscores instead of dashes
                  while IFS='=' read -r key value; do
                    case "$key" in
                      ''|\#*) continue ;;
                    esac
                    key="${key%%[[:space:]]*}"
                    value="${value##[[:space:]]}"
                    sane_key="${key//-/_}"
                    printf -v "$sane_key" '%s' "$value"
                  done < config/overlays/odh/params.env

                  export KSERVE_CONTROLLER_IMAGE="${kserve_controller}"
                  export KSERVE_AGENT_IMAGE="${kserve_agent}"
                  export KSERVE_ROUTER_IMAGE="${kserve_router}"
                  export KSERVE_STORAGE_INITIALIZER_IMAGE="${kserve_storage_initializer}"
                  export LLMD_IMAGE="${kserve_llm_d}"
                  export LLMD_INFERENCE_SCHEDULER_IMAGE="${kserve_llm_d_inference_scheduler}"
                  export LLMD_ROUTING_SIDECAR_IMAGE="${kserve_llm_d_routing_sidecar}"
                  export KUBE_RBAC_PROXY_IMAGE="${kube_rbac_proxy}"

                  echo "Loaded all images from params.env:"
                  echo "KSERVE_CONTROLLER_IMAGE=${KSERVE_CONTROLLER_IMAGE}"
                  echo "KSERVE_AGENT_IMAGE=${KSERVE_AGENT_IMAGE}"
                  echo "KSERVE_ROUTER_IMAGE=${KSERVE_ROUTER_IMAGE}"
                  echo "KSERVE_STORAGE_INITIALIZER_IMAGE=${KSERVE_STORAGE_INITIALIZER_IMAGE}"
                  echo "LLMD_IMAGE=${LLMD_IMAGE}"
                  echo "LLMD_INFERENCE_SCHEDULER_IMAGE=${LLMD_INFERENCE_SCHEDULER_IMAGE}"
                  echo "LLMD_ROUTING_SIDECAR_IMAGE=${LLMD_ROUTING_SIDECAR_IMAGE}"
                  echo "KUBE_RBAC_PROXY_IMAGE=${KUBE_RBAC_PROXY_IMAGE}"

                  ./test/scripts/openshift-ci/run-e2e-tests.sh raw 2 raw
                popd
            - name: must-gather
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:go-its
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                    # component-must-gather, change the component name below
                    mkdir -p "${ARTIFACT_DIR}/gather-kserve"
                    oc adm must-gather --image=quay.io/modh/must-gather:rhoai-2.24 --dest-dir "${ARTIFACT_DIR}/gather-kserve" -- "export COMPONENT=kserve; /usr/bin/gather"

                    # openshift-must-gather
                    mkdir -p "${ARTIFACT_DIR}/gather-openshift"
                    oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"
            - name: git-push-artifacts
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/secure-git-push/0.1/secure-git-push.yaml
              params:
                - name: source-path
                  value: /workspace/artifacts-dir
                - name: repo-path
                  value: 'opendatahub-io/odh-build-metadata'
                - name: repo-branch
                  value: 'ci-artifacts'
                - name: sparse-file-path
                  value: 'test-artifacts/docs'
                - name: dest-path
                  value: 'test-artifacts/$(context.pipelineRun.name)'
                - name: pipelinerun-name
                  value: $(context.pipelineRun.name)




      - name: provision-eaas-space-llmisvc
        runAfter:
          - check-prerequisites
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/build-definitions.git
            - name: revision
              value: main
            - name: pathInRepo
              value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: in
            values: ["pull_request", "retest-all-comment", "on-comment", "test-comment"]
      - name: provision-cluster-llmisvc
        runAfter:
          - provision-eaas-space-llmisvc
        taskSpec:
          results:
            - name: clusterName
              value: "$(steps.create-cluster.results.clusterName)"
          steps:
            - name: get-supported-versions
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space-llmisvc.results.secretRef)
            - name: pick-version
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
              params:
                - name: prefix
                  value: "$(steps.get-supported-versions.results.versions[0])."
            - name: create-cluster
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space-llmisvc.results.secretRef)
                - name: version
                  value: "$(steps.pick-version.results.version)"
                - name: instanceType
                  value: m5.2xlarge
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: in
            values: ["pull_request", "retest-all-comment", "on-comment", "test-comment"]


      - name: e2e-odh-llmisvc
        runAfter:
          - provision-cluster-llmisvc
        params:
        - name: git-url
          value: "$(tasks.parse-metadata.results.source-git-url)"
        - name: git-rev
          value: "$(tasks.parse-metadata.results.source-git-revision)"
        - name: component-image
          value: "$(tasks.parse-metadata.results.component-container-image)"
        taskSpec:
          params:
            - name: git-url
              type: string
            - name: git-rev
              type: string
            - name: component-image
              type: string
          volumes:
            - name: credentials
              emptyDir: {}
          steps:
            - name: get-kubeconfig
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space-llmisvc.results.secretRef)
                - name: clusterName
                  value: "$(tasks.provision-cluster-llmisvc.results.clusterName)"
                - name: credentials
                  value: credentials

            - name: clone-repo
              image: alpine/git
              script: |
                echo $(params.git-url)
                echo $(params.git-rev)
                git clone --depth 50 --no-single-branch $(params.git-url) /workspace/source
                git config --global --add safe.directory /workspace/source
                cd /workspace/source
                git checkout $(params.git-rev)
            - name: e2e-odh-llmisvc
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:model-controller-its
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                set -euxo pipefail
                # apk add --no-cache bash make git curl \
                # && curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
                # && install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl \
                # && rm kubectl && bash

                bash
                ODH_MODEL_CONTROLLER_IMAGE=$(params.component-image)
                echo "ODH_MODEL_CONTROLLER_IMAGE=${ODH_MODEL_CONTROLLER_IMAGE}"

                git clone https://github.com/opendatahub-io/kserve.git /tmp/kserve
                pushd /tmp/kserve
                  git fetch --all --tags
                  git checkout release-v0.15
                  export GITHUB_SHA="${PULL_BASE_SHA:-stable}"
                  export ODH_MODEL_CONTROLLER_IMAGE="${ODH_MODEL_CONTROLLER_IMAGE}"

                  echo "Loading environment variables from params.env"
                  #Parse params.env into shell vars with underscores instead of dashes
                  while IFS='=' read -r key value; do
                    case "$key" in
                      ''|\#*) continue ;;
                    esac
                    key="${key%%[[:space:]]*}"
                    value="${value##[[:space:]]}"
                    sane_key="${key//-/_}"
                    printf -v "$sane_key" '%s' "$value"
                  done < config/overlays/odh/params.env

                  export KSERVE_CONTROLLER_IMAGE="${kserve_controller}"
                  export KSERVE_AGENT_IMAGE="${kserve_agent}"
                  export KSERVE_ROUTER_IMAGE="${kserve_router}"
                  export KSERVE_STORAGE_INITIALIZER_IMAGE="${kserve_storage_initializer}"
                  export LLMD_IMAGE="${kserve_llm_d}"
                  export LLMD_INFERENCE_SCHEDULER_IMAGE="${kserve_llm_d_inference_scheduler}"
                  export LLMD_ROUTING_SIDECAR_IMAGE="${kserve_llm_d_routing_sidecar}"
                  export KUBE_RBAC_PROXY_IMAGE="${kube_rbac_proxy}"

                  echo "Loaded all images from params.env:"
                  echo "KSERVE_CONTROLLER_IMAGE=${KSERVE_CONTROLLER_IMAGE}"
                  echo "KSERVE_AGENT_IMAGE=${KSERVE_AGENT_IMAGE}"
                  echo "KSERVE_ROUTER_IMAGE=${KSERVE_ROUTER_IMAGE}"
                  echo "KSERVE_STORAGE_INITIALIZER_IMAGE=${KSERVE_STORAGE_INITIALIZER_IMAGE}"
                  echo "LLMD_IMAGE=${LLMD_IMAGE}"
                  echo "LLMD_INFERENCE_SCHEDULER_IMAGE=${LLMD_INFERENCE_SCHEDULER_IMAGE}"
                  echo "LLMD_ROUTING_SIDECAR_IMAGE=${LLMD_ROUTING_SIDECAR_IMAGE}"
                  echo "KUBE_RBAC_PROXY_IMAGE=${KUBE_RBAC_PROXY_IMAGE}"

                  ./test/scripts/openshift-ci/run-e2e-tests.sh "llminferenceservice and (cluster_cpu and cluster_single_node)" 2 "llm-d"
                popd
            - name: must-gather
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:go-its
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                    # component-must-gather, change the component name below
                    mkdir -p "${ARTIFACT_DIR}/gather-kserve"
                    oc adm must-gather --image=quay.io/modh/must-gather:rhoai-2.24 --dest-dir "${ARTIFACT_DIR}/gather-kserve" -- "export COMPONENT=kserve; /usr/bin/gather"

                    # openshift-must-gather
                    mkdir -p "${ARTIFACT_DIR}/gather-openshift"
                    oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"
            - name: git-push-artifacts
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/secure-git-push/0.1/secure-git-push.yaml
              params:
                - name: source-path
                  value: /workspace/artifacts-dir
                - name: repo-path
                  value: 'opendatahub-io/odh-build-metadata'
                - name: repo-branch
                  value: 'ci-artifacts'
                - name: sparse-file-path
                  value: 'test-artifacts/docs'
                - name: dest-path
                  value: 'test-artifacts/$(context.pipelineRun.name)'
                - name: pipelinerun-name
                  value: $(context.pipelineRun.name)
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: in
            values: ["pull_request", "retest-all-comment", "on-comment", "test-comment"]
    finally:
    - name: push-ci-artifacts-and-update-pr
      params:
        - name: oci-artifacts-repo
          value: $(params.oci-artifacts-repo)
        - name: pipeline-status
          value: $(tasks.status)
      taskSpec:
        volumes:
          - name: odh-registry-secret-volume
            secret:
              secretName: odh-registry-secret
              items:
              - key: .dockerconfigjson
                path: oci-storage-dockerconfigjson
        params:
          - name: oci-artifacts-repo
            description: oci-artifacts-repo
          - name: pipeline-status
            type: string
        steps:
          - name: pull-ci-artifacts
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/git-clone/0.1/git-clone.yaml
            params:
              - name: repo-path
                value: 'opendatahub-io/odh-build-metadata'
              - name: repo-branch
                value: 'ci-artifacts'
              - name: sparse-file-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
              - name: dest-path
                value: /workspace/odh-ci-artifacts
              - name: artifacts-dir-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
          - name: secure-push-oci
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: '/workspace/odh-ci-artifacts/test-artifacts/$(context.pipelineRun.name)'
              - name: oci-ref
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: credentials-volume-name
                value: odh-registry-secret-volume
          - name: share-status-on-pull-request
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/pull-request-comment/0.1/pull-request-comment.yaml
            params:
              - name: test-name
                value: $(context.pipelineRun.name)
              - name: oci-container
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: pipeline-aggregate-status
                value: $(params.pipeline-status)
              - name: pull-request-author
                value: $(tasks.check-prerequisites.results.pull-request-author)
              - name: pull-request-number
                value: $(tasks.check-prerequisites.results.pull-request-number)
              - name: git-repo
                value: $(tasks.check-prerequisites.results.git-repo)
              - name: git-org
                value: $(tasks.check-prerequisites.results.git-org)
              - name: git-revision
                value: $(tasks.check-prerequisites.results.git-revision)
              - name: artifact-browser-url
                value: $(params.artifact-browser-url)
          - name: cleanup-artifacts-from-git
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/cleanup-git-repo/0.1/cleanup-git-repo.yaml
            params:
              - name: work-dir
                value: '/workspace/odh-ci-artifacts'
              - name: artifacts-dir-path
                value: 'test-artifacts'
              - name: dir-to-be-deleted
                value: '$(context.pipelineRun.name)'
